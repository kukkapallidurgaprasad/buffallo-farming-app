services:
  - type: web
    name: buffalo-farming-app
    env: python
    region: singapore
    plan: free
    buildCommand: cd backend && pip install -r requirements.txt
    startCommand: cd backend && gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: buffalo-farming-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0
    healthCheckPath: /api/stats

databases:
  - name: buffalo-farming-db
    plan: free
    databaseName: buffalo_farming
    user: buffalo_user
    region: singapore
